version: "3.8"

services:

  mongo:
    image: mongo:6
    container_name: petfinder-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: .
    container_name: petfinder-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/petfinder

volumes:
  mongo-data: